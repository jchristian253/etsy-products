<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6AM BUILDER — WiredAndBuilt Wall Art</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .art-frame {
    width: 800px;
    height: 1000px;
    background: #0d0d0d;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Gritty overlay */
  .art-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.07;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 2;
  }

  /* Subtle horizontal rule lines across the frame */
  .grid-lines {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }
  .grid-lines::before {
    content: '';
    position: absolute;
    top: 25%;
    left: 10%;
    right: 10%;
    height: 1px;
    background: linear-gradient(to right, transparent, #222 20%, #222 80%, transparent);
  }
  .grid-lines::after {
    content: '';
    position: absolute;
    top: 75%;
    left: 10%;
    right: 10%;
    height: 1px;
    background: linear-gradient(to right, transparent, #222 20%, #222 80%, transparent);
  }

  .content {
    position: relative;
    z-index: 3;
    text-align: center;
    padding: 60px 50px;
  }

  /* Timeline arrow design */
  .timeline {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 45px;
  }

  .time-block {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .time-val {
    font-family: 'Share Tech Mono', 'Bebas Neue', monospace;
    font-size: 52px;
    color: #fff;
    letter-spacing: 3px;
    line-height: 1;
  }

  .time-label {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    color: #555;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .arrow-connector {
    display: flex;
    align-items: center;
    padding: 0 20px;
    margin-bottom: 18px;
  }
  .arrow-connector .shaft {
    width: 40px;
    height: 2px;
    background: #E8640A;
  }
  .arrow-connector .head {
    width: 0;
    height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 10px solid #E8640A;
  }

  .build-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 18px;
  }
  .build-text {
    font-family: 'Bebas Neue', 'Oswald', sans-serif;
    font-size: 52px;
    color: #E8640A;
    letter-spacing: 6px;
    line-height: 1;
  }
  .build-label {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    color: #555;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Full headline below */
  .headline {
    font-family: 'Bebas Neue', 'Oswald', sans-serif;
    font-size: 64px;
    color: #ffffff;
    letter-spacing: 6px;
    line-height: 1.1;
    margin-top: 10px;
  }
  .headline .orange { color: #E8640A; }

  .divider {
    width: 60px;
    height: 3px;
    background: #E8640A;
    margin: 35px auto;
  }

  .subtext {
    font-family: 'Oswald', sans-serif;
    font-size: 17px;
    color: #777;
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1.8;
    font-weight: 400;
  }

  /* Side accent */
  .left-accent {
    position: absolute;
    left: 35px;
    top: 50%;
    transform: translateY(-50%);
    width: 2px;
    height: 200px;
    background: linear-gradient(to bottom, transparent, #E8640A 40%, #E8640A 60%, transparent);
    opacity: 0.3;
    z-index: 3;
  }

  .right-accent {
    position: absolute;
    right: 35px;
    top: 50%;
    transform: translateY(-50%);
    width: 2px;
    height: 200px;
    background: linear-gradient(to bottom, transparent, #E8640A 40%, #E8640A 60%, transparent);
    opacity: 0.3;
    z-index: 3;
  }

  @media print {
    html, body {
      width: 8in;
      height: 10in;
      margin: 0;
      padding: 0;
      background: #0d0d0d;
    }
    .art-frame {
      width: 8in;
      height: 10in;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    @page {
      size: 8in 10in;
      margin: 0;
    }
  }
</style>
</head>
<body>
<div class="art-frame">
  <div class="grid-lines"></div>
  <div class="left-accent"></div>
  <div class="right-accent"></div>
  <div class="content">
    <div class="timeline">
      <div class="time-block">
        <div class="time-val">6AM</div>
        <div class="time-label">Clock in</div>
      </div>
      <div class="arrow-connector">
        <div class="shaft"></div>
        <div class="head"></div>
      </div>
      <div class="time-block">
        <div class="time-val">3PM</div>
        <div class="time-label">Clock out</div>
      </div>
      <div class="arrow-connector">
        <div class="shaft"></div>
        <div class="head"></div>
      </div>
      <div class="build-block">
        <div class="build-text">BUILD</div>
        <div class="build-label">Every night</div>
      </div>
    </div>

    <div class="headline">WE <span class="orange">BUILD</span></div>

    <div class="divider"></div>

    <div class="subtext">
      The trade pays the bills.<br>
      The builds feed the soul.
    </div>
  </div>
</div>
</body>
</html>
