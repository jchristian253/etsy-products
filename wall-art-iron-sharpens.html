<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON SHARPENS IRON — WiredAndBuilt Wall Art</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Bebas+Neue&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .art-frame {
    width: 800px;
    height: 1000px;
    background: #1a1a1a;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Metallic gradient overlay */
  .art-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(170deg, rgba(255,255,255,0.02) 0%, transparent 40%),
      radial-gradient(ellipse at 50% 50%, rgba(232,100,10,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 1;
  }

  .art-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.08;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 2;
  }

  .content {
    position: relative;
    z-index: 3;
    text-align: center;
    padding: 60px 50px;
  }

  /* Two crossing lines forming an X */
  .cross-mark {
    width: 60px;
    height: 60px;
    position: relative;
    margin: 0 auto 40px;
  }
  .cross-mark::before,
  .cross-mark::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 60px;
    height: 2px;
    background: #E8640A;
    opacity: 0.5;
  }
  .cross-mark::before { transform: translate(-50%, -50%) rotate(45deg); }
  .cross-mark::after { transform: translate(-50%, -50%) rotate(-45deg); }

  .headline {
    font-family: 'Bebas Neue', 'Oswald', sans-serif;
    font-size: 88px;
    color: #ffffff;
    letter-spacing: 8px;
    line-height: 1.1;
    text-transform: uppercase;
  }

  .headline .accent {
    color: #E8640A;
  }

  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin: 35px auto;
  }
  .divider-line {
    width: 60px;
    height: 2px;
    background: #E8640A;
  }
  .divider-dot {
    width: 6px;
    height: 6px;
    background: #E8640A;
    transform: rotate(45deg);
  }

  .subtext {
    font-family: 'Oswald', sans-serif;
    font-size: 17px;
    color: #888;
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1.8;
    max-width: 500px;
    margin: 0 auto;
    font-weight: 400;
  }

  /* Vertical side accents */
  .v-accent-l {
    position: absolute;
    left: 50px;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 300px;
    background: linear-gradient(to bottom, transparent, #333 30%, #333 70%, transparent);
    z-index: 3;
  }
  .v-accent-r {
    position: absolute;
    right: 50px;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 300px;
    background: linear-gradient(to bottom, transparent, #333 30%, #333 70%, transparent);
    z-index: 3;
  }

  @media print {
    html, body {
      width: 8in;
      height: 10in;
      margin: 0;
      padding: 0;
      background: #1a1a1a;
    }
    .art-frame {
      width: 8in;
      height: 10in;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    @page {
      size: 8in 10in;
      margin: 0;
    }
  }
</style>
</head>
<body>
<div class="art-frame">
  <div class="v-accent-l"></div>
  <div class="v-accent-r"></div>
  <div class="content">
    <div class="cross-mark"></div>
    <div class="headline"><span class="accent">IRON</span><br>SHARPENS<br><span class="accent">IRON</span></div>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>
    <div class="subtext">Surround yourself with people<br>who build, not just talk.</div>
  </div>
</div>
</body>
</html>
