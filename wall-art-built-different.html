<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Built Different — Outdoors</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 800px; height: 1000px;
    background: #2D4A2D;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Source Sans 3', sans-serif;
    overflow: hidden;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(60, 90, 60, 0.5) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(20, 35, 20, 0.4) 0%, transparent 50%);
    z-index: 0;
  }

  .poster {
    position: relative; z-index: 1;
    width: 680px; height: 900px;
    display: flex; flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 60px 50px 0 50px;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    margin-bottom: 20px;
  }

  .top-bar .dash {
    width: 40px; height: 2px;
    background: #E8640A;
  }

  .top-bar span {
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(245, 240, 232, 0.5);
    font-weight: 300;
  }

  .main-text {
    text-align: center;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-bottom: 80px;
  }

  h1 {
    font-family: 'Teko', sans-serif;
    font-weight: 700;
    font-size: 110px;
    color: #F5F0E8;
    line-height: 0.9;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  h1 .accent {
    color: #E8640A;
  }

  .tagline {
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 300;
    font-size: 16px;
    color: rgba(245, 240, 232, 0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 2;
    text-align: center;
  }

  .arrow-down {
    margin: 30px 0;
  }

  .sub-quote {
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 400;
    font-size: 15px;
    color: rgba(245, 240, 232, 0.55);
    letter-spacing: 1px;
    max-width: 360px;
    text-align: center;
    line-height: 1.8;
    font-style: italic;
  }

  .mountains {
    width: 100%;
    position: absolute;
    bottom: 0; left: 0;
  }

  .side-text {
    position: absolute;
    right: 24px;
    top: 50%;
    transform: rotate(90deg) translateX(-50%);
    transform-origin: right center;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(245, 240, 232, 0.2);
    font-weight: 300;
    white-space: nowrap;
  }

  @media print {
    body { width: 8in; height: 10in; }
  }
</style>
</head>
<body>

<div class="poster">
  <div class="top-bar">
    <div class="dash"></div>
    <span>Wired &amp; Built Co.</span>
    <div class="dash"></div>
  </div>

  <div class="main-text">
    <h1>BUILT<br/><span class="accent">DIFFERENT</span></h1>

    <div class="tagline">
      Not everyone has the hands<br/>
      to build what others<br/>
      only dream of.
    </div>

    <div class="arrow-down">
      <svg width="20" height="40" viewBox="0 0 20 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="10" y1="0" x2="10" y2="32" stroke="#E8640A" stroke-width="1.5"/>
        <polyline points="4,26 10,34 16,26" stroke="#E8640A" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="sub-quote">
      The wilderness doesn't care about<br/>your excuses — neither should you.
    </div>
  </div>

  <div class="side-text">Explore · Build · Conquer</div>
</div>

<!-- Mountain silhouette SVG -->
<svg class="mountains" viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <polygon points="0,260 0,180 80,120 140,155 200,90 280,140 340,70 400,110 460,60 520,100 580,45 640,95 700,65 760,110 800,80 800,260"
    fill="#1E351E" opacity="0.5"/>
  <polygon points="0,260 0,200 60,160 130,190 190,140 260,175 330,120 400,160 470,110 530,150 600,100 660,145 720,105 800,140 800,260"
    fill="#1E351E" opacity="0.7"/>
  <polygon points="0,260 0,220 100,175 170,200 250,165 340,195 420,155 500,190 560,160 650,185 730,160 800,180 800,260"
    fill="#162816"/>
  <g fill="#1E351E" opacity="0.8">
    <polygon points="108,175 112,158 116,175"/>
    <polygon points="130,182 134,164 138,182"/>
    <polygon points="260,168 264,150 268,168"/>
    <polygon points="280,173 284,156 288,173"/>
    <polygon points="430,158 434,140 438,158"/>
    <polygon points="450,162 454,145 458,162"/>
    <polygon points="570,163 574,146 578,163"/>
    <polygon points="660,185 664,168 668,185"/>
    <polygon points="740,163 744,146 748,163"/>
  </g>
  <g fill="#F5F0E8" opacity="0.15">
    <polygon points="340,70 330,85 350,85"/>
    <polygon points="460,60 448,78 472,78"/>
    <polygon points="580,45 566,65 594,65"/>
    <polygon points="700,65 688,82 712,82"/>
  </g>
</svg>

</body>
</html>
