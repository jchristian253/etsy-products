<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MADE BY HAND — WiredAndBuilt Wall Art</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&family=Bebas+Neue&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .art-frame {
    width: 800px;
    height: 1000px;
    background: #0d0d0d;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .content {
    position: relative;
    z-index: 3;
    text-align: center;
    padding: 60px 60px;
  }

  /* Small tool silhouette — hammer */
  .tool-icon {
    margin-bottom: 50px;
    opacity: 0.5;
  }
  .tool-icon svg {
    width: 48px;
    height: 48px;
  }

  .headline {
    font-family: 'Bebas Neue', 'Oswald', sans-serif;
    font-size: 72px;
    color: #ffffff;
    letter-spacing: 6px;
    line-height: 1.15;
    text-transform: uppercase;
  }

  .headline .line2 {
    color: #E8640A;
  }

  .thin-rule {
    width: 100px;
    height: 1px;
    background: #333;
    margin: 40px auto;
    position: relative;
  }
  .thin-rule::after {
    content: '';
    position: absolute;
    left: 50%;
    top: -3px;
    transform: translateX(-50%);
    width: 8px;
    height: 8px;
    border: 1px solid #E8640A;
    transform: translateX(-50%) rotate(45deg);
    background: transparent;
  }

  .subtext {
    font-family: 'Oswald', sans-serif;
    font-weight: 300;
    font-size: 18px;
    color: #666;
    letter-spacing: 5px;
    text-transform: uppercase;
    line-height: 2;
  }

  /* Minimal border frame */
  .inner-border {
    position: absolute;
    top: 30px;
    left: 30px;
    right: 30px;
    bottom: 30px;
    border: 1px solid #1a1a1a;
    z-index: 1;
    pointer-events: none;
  }

  /* Subtle corner dots */
  .dot-tl, .dot-tr, .dot-bl, .dot-br {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #E8640A;
    opacity: 0.4;
    z-index: 3;
  }
  .dot-tl { top: 28px; left: 28px; }
  .dot-tr { top: 28px; right: 28px; }
  .dot-bl { bottom: 28px; left: 28px; }
  .dot-br { bottom: 28px; right: 28px; }

  @media print {
    html, body {
      width: 8in;
      height: 10in;
      margin: 0;
      padding: 0;
      background: #0d0d0d;
    }
    .art-frame {
      width: 8in;
      height: 10in;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    @page {
      size: 8in 10in;
      margin: 0;
    }
  }
</style>
</head>
<body>
<div class="art-frame">
  <div class="inner-border"></div>
  <div class="dot-tl"></div>
  <div class="dot-tr"></div>
  <div class="dot-bl"></div>
  <div class="dot-br"></div>
  <div class="content">
    <div class="tool-icon">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Hammer silhouette -->
        <rect x="22" y="20" width="4" height="22" rx="1" fill="#E8640A"/>
        <rect x="10" y="8" width="28" height="14" rx="2" fill="#E8640A"/>
        <rect x="36" y="10" width="6" height="10" rx="1" fill="#E8640A" opacity="0.6"/>
      </svg>
    </div>

    <div class="headline">
      MADE BY HAND.<br>
      <span class="line2">POWERED BY GRIT.</span>
    </div>

    <div class="thin-rule"></div>

    <div class="subtext">
      No shortcuts.<br>
      No excuses.<br>
      Just work.
    </div>
  </div>
</div>
</body>
</html>
