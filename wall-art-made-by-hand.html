<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Made by Hand — Premium Art Print</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 800px; height: 1000px;
    background: #FFFFFF;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Lato', sans-serif;
    overflow: hidden;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .frame {
    width: 640px; height: 840px;
    position: relative;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border: 1px solid #E0D8D0;
    padding: 60px;
  }

  .frame::before {
    content: '';
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border: 0.5px solid #D0C8C0;
  }

  .icon-area {
    margin-bottom: 50px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-size: 58px;
    color: #2C2C2C;
    text-align: center;
    line-height: 1.15;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  h1 em {
    font-style: italic;
    color: #8B0000;
  }

  .rule {
    width: 60px;
    height: 1px;
    background: #2C2C2C;
    margin: 32px auto;
  }

  .subtitle {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #888;
    text-align: center;
    margin-bottom: 40px;
  }

  .quote-block {
    text-align: center;
    max-width: 380px;
  }

  .quote-block p {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 18px;
    color: #555;
    line-height: 1.8;
  }

  .bottom-mark {
    position: absolute;
    bottom: 40px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .bottom-mark .dot {
    width: 4px; height: 4px;
    background: #8B0000;
    border-radius: 50%;
  }

  .bottom-mark span {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #AAA;
  }

  @media print {
    body { width: 8in; height: 10in; }
  }
</style>
</head>
<body>

<div class="frame">

  <div class="icon-area">
    <svg width="100" height="120" viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="30" y="10" width="40" height="16" rx="2" stroke="#2C2C2C" stroke-width="1.5" fill="none"/>
      <line x1="50" y1="26" x2="50" y2="80" stroke="#2C2C2C" stroke-width="1.5"/>
      <path d="M30 72 C30 68 36 64 42 66 L42 80" stroke="#2C2C2C" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M42 66 L42 58 C42 55 46 54 48 56 L48 66" stroke="#2C2C2C" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M48 62 L48 56 C48 53 52 52 54 54 L54 66" stroke="#2C2C2C" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M54 64 L54 58 C54 55 58 54 60 56 L60 70" stroke="#2C2C2C" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M60 70 C62 76 60 82 54 84 L38 84 C32 84 28 78 30 72" stroke="#2C2C2C" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <line x1="44" y1="14" x2="44" y2="22" stroke="#8B0000" stroke-width="1" opacity="0.6"/>
      <line x1="56" y1="14" x2="56" y2="22" stroke="#8B0000" stroke-width="1" opacity="0.6"/>
    </svg>
  </div>

  <h1>Made by <em>Hand.</em></h1>
  <h1>Powered by <em>Grit.</em></h1>

  <div class="rule"></div>

  <div class="subtitle">No Shortcuts</div>

  <div class="quote-block">
    <p>No shortcuts.<br/>No excuses.<br/>Just work.</p>
  </div>

  <div class="bottom-mark">
    <div class="dot"></div>
    <span>Wired &amp; Built</span>
    <div class="dot"></div>
  </div>

</div>

</body>
</html>
