<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NO SHORTCUTS — WiredAndBuilt Wall Art</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Bebas+Neue&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .art-frame {
    width: 800px;
    height: 1000px;
    background: #0d0d0d;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .art-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.07;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 2;
  }

  /* Diagonal caution stripes in background */
  .stripes {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 8px;
    z-index: 3;
    background: repeating-linear-gradient(
      -45deg,
      #E8640A 0px,
      #E8640A 10px,
      transparent 10px,
      transparent 20px
    );
    opacity: 0.25;
  }
  .stripes-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 8px;
    z-index: 3;
    background: repeating-linear-gradient(
      -45deg,
      #E8640A 0px,
      #E8640A 10px,
      transparent 10px,
      transparent 20px
    );
    opacity: 0.25;
  }

  .content {
    position: relative;
    z-index: 3;
    text-align: center;
    padding: 60px 60px;
  }

  /* Crossed-out "SHORTCUTS" */
  .struck {
    font-family: 'Bebas Neue', 'Oswald', sans-serif;
    font-size: 52px;
    color: #444;
    letter-spacing: 14px;
    text-decoration: line-through;
    text-decoration-color: #E8640A;
    text-decoration-thickness: 3px;
    margin-bottom: 20px;
  }

  .headline {
    font-family: 'Bebas Neue', 'Oswald', sans-serif;
    font-size: 110px;
    color: #ffffff;
    letter-spacing: 12px;
    line-height: 1;
    text-transform: uppercase;
  }

  .headline .accent {
    color: #E8640A;
  }

  .divider {
    width: 180px;
    height: 3px;
    background: #E8640A;
    margin: 40px auto;
  }

  .subtext {
    font-family: 'Oswald', sans-serif;
    font-size: 17px;
    color: #888;
    letter-spacing: 4px;
    text-transform: uppercase;
    line-height: 1.8;
    font-weight: 400;
  }

  .side-text {
    position: absolute;
    right: 38px;
    top: 50%;
    transform: translateY(-50%) rotate(90deg);
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: #333;
    text-transform: uppercase;
    z-index: 3;
  }

  @media print {
    html, body {
      width: 8in;
      height: 10in;
      margin: 0;
      padding: 0;
      background: #0d0d0d;
    }
    .art-frame {
      width: 8in;
      height: 10in;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    @page {
      size: 8in 10in;
      margin: 0;
    }
  }
</style>
</head>
<body>
<div class="art-frame">
  <div class="stripes"></div>
  <div class="content">
    <div class="struck">SHORTCUTS</div>
    <div class="headline"><span class="accent">NO</span><br>SHORTCUTS</div>
    <div class="divider"></div>
    <div class="subtext">Every callus was earned.<br>Every skill was built the hard way.</div>
  </div>
  <div class="stripes-bottom"></div>
  <div class="side-text">WiredAndBuilt</div>
</div>
</body>
</html>
