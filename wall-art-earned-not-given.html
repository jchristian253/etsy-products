<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EARNED NOT GIVEN — WiredAndBuilt Wall Art</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Bebas+Neue&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .art-frame {
    width: 800px;
    height: 1000px;
    background: #0d0d0d;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .art-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 60%, rgba(232,100,10,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 1;
  }

  .art-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.07;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 2;
  }

  .content {
    position: relative;
    z-index: 3;
    text-align: center;
    padding: 60px 50px;
  }

  /* Medal/badge style circle */
  .badge {
    width: 100px;
    height: 100px;
    border: 2px solid #E8640A;
    border-radius: 50%;
    margin: 0 auto 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.25;
    position: relative;
  }
  .badge::before {
    content: '';
    width: 80px;
    height: 80px;
    border: 1px solid #E8640A;
    border-radius: 50%;
  }

  .headline {
    font-family: 'Bebas Neue', 'Oswald', sans-serif;
    font-size: 96px;
    color: #ffffff;
    letter-spacing: 10px;
    line-height: 1.05;
    text-transform: uppercase;
  }

  .headline .accent {
    color: #E8640A;
  }

  .headline .dim {
    color: #444;
    font-size: 60px;
    letter-spacing: 14px;
  }

  .divider {
    width: 160px;
    height: 3px;
    background: #E8640A;
    margin: 40px auto;
  }

  .subtext {
    font-family: 'Oswald', sans-serif;
    font-size: 17px;
    color: #888;
    letter-spacing: 4px;
    text-transform: uppercase;
    line-height: 1.8;
    font-weight: 400;
  }

  /* Corner accents */
  .corner-br {
    position: absolute;
    bottom: 40px;
    right: 40px;
    width: 45px;
    height: 45px;
    border-right: 2px solid #E8640A;
    border-bottom: 2px solid #E8640A;
    opacity: 0.3;
    z-index: 3;
  }
  .corner-tl {
    position: absolute;
    top: 40px;
    left: 40px;
    width: 45px;
    height: 45px;
    border-left: 2px solid #E8640A;
    border-top: 2px solid #E8640A;
    opacity: 0.3;
    z-index: 3;
  }

  .side-text {
    position: absolute;
    right: 38px;
    top: 50%;
    transform: translateY(-50%) rotate(90deg);
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: #333;
    text-transform: uppercase;
    z-index: 3;
  }

  @media print {
    html, body {
      width: 8in;
      height: 10in;
      margin: 0;
      padding: 0;
      background: #0d0d0d;
    }
    .art-frame {
      width: 8in;
      height: 10in;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    @page {
      size: 8in 10in;
      margin: 0;
    }
  }
</style>
</head>
<body>
<div class="art-frame">
  <div class="corner-tl"></div>
  <div class="content">
    <div class="badge"></div>
    <div class="headline"><span class="accent">EARNED</span><br><span class="dim">NOT</span><br>GIVEN</div>
    <div class="divider"></div>
    <div class="subtext">Nobody handed you a thing.<br>Remember that.</div>
  </div>
  <div class="corner-br"></div>
  <div class="side-text">WiredAndBuilt</div>
</div>
</body>
</html>
