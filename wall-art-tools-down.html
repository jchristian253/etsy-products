<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOOLS DOWN — WiredAndBuilt Wall Art</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Bebas+Neue&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .art-frame {
    width: 800px;
    height: 1000px;
    background: #1a1a1a;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Subtle radial glow */
  .art-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 45%, rgba(232,100,10,0.05) 0%, transparent 55%);
    pointer-events: none;
    z-index: 1;
  }

  /* Grain */
  .art-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 2;
  }

  .content {
    position: relative;
    z-index: 3;
    text-align: center;
    padding: 60px 50px;
  }

  /* Wrench icon above */
  .icon-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 50px;
    opacity: 0.2;
  }
  .icon-row svg {
    width: 28px;
    height: 28px;
  }

  .headline {
    font-family: 'Bebas Neue', 'Oswald', sans-serif;
    font-size: 88px;
    color: #ffffff;
    letter-spacing: 10px;
    line-height: 1.1;
    text-transform: uppercase;
  }

  .headline .accent {
    color: #E8640A;
  }

  .dot {
    display: inline-block;
    color: #E8640A;
  }

  .divider {
    width: 140px;
    height: 3px;
    background: #E8640A;
    margin: 40px auto;
    position: relative;
  }

  .subtext {
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    color: #888;
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1.8;
    max-width: 480px;
    margin: 0 auto;
    font-weight: 400;
  }

  /* Corner brackets */
  .corner-br {
    position: absolute;
    bottom: 40px;
    right: 40px;
    width: 45px;
    height: 45px;
    border-right: 2px solid #E8640A;
    border-bottom: 2px solid #E8640A;
    opacity: 0.3;
    z-index: 3;
  }
  .corner-tl {
    position: absolute;
    top: 40px;
    left: 40px;
    width: 45px;
    height: 45px;
    border-left: 2px solid #E8640A;
    border-top: 2px solid #E8640A;
    opacity: 0.3;
    z-index: 3;
  }

  .side-text {
    position: absolute;
    left: 38px;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: #333;
    text-transform: uppercase;
    z-index: 3;
  }

  @media print {
    html, body {
      width: 8in;
      height: 10in;
      margin: 0;
      padding: 0;
      background: #1a1a1a;
    }
    .art-frame {
      width: 8in;
      height: 10in;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    @page {
      size: 8in 10in;
      margin: 0;
    }
  }
</style>
</head>
<body>
<div class="art-frame">
  <div class="corner-tl"></div>
  <div class="content">
    <div class="icon-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="#E8640A" stroke-width="1.5" stroke-linecap="round"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.8-3.8a6 6 0 01-7.5 7.5L6.5 20.5a2.1 2.1 0 01-3-3L11 10a6 6 0 017.5-7.5l-3.8 3.8z"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="#E8640A" stroke-width="1.5" stroke-linecap="round"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.8-3.8a6 6 0 01-7.5 7.5L6.5 20.5a2.1 2.1 0 01-3-3L11 10a6 6 0 017.5-7.5l-3.8 3.8z"/></svg>
    </div>
    <div class="headline">TOOLS DOWN<span class="dot">.</span><br><span class="accent">NEVER DONE<span class="dot">.</span></span></div>
    <div class="divider"></div>
    <div class="subtext">The work is never finished.<br>That's the whole point.</div>
  </div>
  <div class="corner-br"></div>
  <div class="side-text">WiredAndBuilt</div>
</div>
</body>
</html>
