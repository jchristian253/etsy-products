<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Built Not Bought — Industrial Craftsman</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Rajdhani:wght@400;500;600;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 800px; height: 1000px;
    background: #8B3A2A;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    position: relative;
  }

  /* Noise/grain texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 40% 30%, rgba(160, 80, 60, 0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 70%, rgba(80, 30, 20, 0.5) 0%, transparent 50%);
    z-index: 0;
  }

  .poster {
    position: relative; z-index: 1;
    width: 660px; height: 880px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    /* Industrial border — double line with rivets */
    border: 3px solid rgba(212, 168, 67, 0.4);
    outline: 1px solid rgba(212, 168, 67, 0.15);
    outline-offset: 8px;
  }

  /* Rivet/bolt decorations */
  .rivet {
    position: absolute;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #D4A843, #8B7530);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.3), 0 2px 4px rgba(0,0,0,0.3);
    z-index: 3;
  }
  .rivet::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(0,0,0,0.2);
  }
  .rivet.tl { top: -9px; left: -9px; }
  .rivet.tr { top: -9px; right: -9px; }
  .rivet.bl { bottom: -9px; left: -9px; }
  .rivet.br { bottom: -9px; right: -9px; }
  .rivet.tm { top: -9px; left: 50%; transform: translateX(-50%); }
  .rivet.bm { bottom: -9px; left: 50%; transform: translateX(-50%); }

  .top-banner {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #D4A843;
    margin-bottom: 40px;
  }

  .icon-row {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 40px;
    margin-bottom: 36px;
  }

  h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 86px;
    color: #F5F5F5;
    line-height: 0.95;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 0;
  }

  .struck {
    position: relative;
    display: inline-block;
    color: rgba(245, 245, 245, 0.25);
  }

  .struck::after {
    content: '';
    position: absolute;
    top: 50%; left: -4px; right: -4px;
    height: 5px;
    background: #D4A843;
    transform: rotate(-3deg);
  }

  .vs-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin: 16px 0;
  }

  .vs-line .line {
    width: 80px; height: 1px;
    background: rgba(212, 168, 67, 0.4);
  }

  .vs-line span {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #D4A843;
    letter-spacing: 4px;
  }

  .tagline {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: rgba(245, 245, 245, 0.6);
    letter-spacing: 4px;
    text-transform: uppercase;
    line-height: 2;
    margin-top: 30px;
  }

  .bottom-stamp {
    position: absolute;
    bottom: 35px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .bottom-stamp .bar {
    width: 20px; height: 2px;
    background: #D4A843;
  }

  .bottom-stamp span {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(245, 245, 245, 0.3);
  }

  @media print {
    body { width: 8in; height: 10in; }
  }
</style>
</head>
<body>

<div class="poster">
  <div class="rivet tl"></div>
  <div class="rivet tr"></div>
  <div class="rivet bl"></div>
  <div class="rivet br"></div>
  <div class="rivet tm"></div>
  <div class="rivet bm"></div>

  <div class="top-banner">Forged · Not · Factory</div>

  <div class="icon-row">
    <!-- Hammer SVG -->
    <svg width="70" height="90" viewBox="0 0 70 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Handle -->
      <rect x="31" y="30" width="8" height="55" rx="2" fill="#D4A843" opacity="0.3" stroke="#D4A843" stroke-width="1.5"/>
      <!-- Hammer head -->
      <rect x="10" y="8" width="50" height="24" rx="3" fill="none" stroke="#F5F5F5" stroke-width="2.5"/>
      <rect x="14" y="12" width="42" height="16" rx="1" fill="rgba(245,245,245,0.08)"/>
      <!-- Strike lines -->
      <line x1="4" y1="4" x2="12" y2="10" stroke="#D4A843" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="20" x2="8" y2="20" stroke="#D4A843" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="62" y1="4" x2="58" y2="10" stroke="#D4A843" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="70" y1="20" x2="62" y2="20" stroke="#D4A843" stroke-width="1.5" stroke-linecap="round"/>
    </svg>

    <!-- Anvil SVG -->
    <svg width="90" height="80" viewBox="0 0 90 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Anvil body -->
      <path d="M10 35 L5 35 Q0 35 2 30 L15 20 L75 20 L85 30 Q90 35 85 35 L80 35" stroke="#F5F5F5" stroke-width="2.5" fill="none"/>
      <!-- Anvil top face -->
      <path d="M15 20 L12 12 Q10 8 15 8 L75 8 Q80 8 78 12 L75 20" stroke="#F5F5F5" stroke-width="2.5" fill="rgba(245,245,245,0.08)"/>
      <!-- Horn -->
      <path d="M15 8 L-2 16" stroke="#F5F5F5" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Base -->
      <rect x="16" y="35" width="58" height="8" rx="1" fill="none" stroke="#F5F5F5" stroke-width="2"/>
      <path d="M20 43 L14 60 L76 60 L70 43" fill="none" stroke="#F5F5F5" stroke-width="2"/>
      <!-- Base plate -->
      <rect x="8" y="60" width="74" height="6" rx="1" fill="none" stroke="#D4A843" stroke-width="1.5"/>
      <!-- Spark marks -->
      <circle cx="45" cy="5" r="1.5" fill="#D4A843"/>
      <circle cx="38" cy="2" r="1" fill="#D4A843" opacity="0.6"/>
      <circle cx="52" cy="3" r="1" fill="#D4A843" opacity="0.6"/>
    </svg>
  </div>

  <h1>BUILT</h1>

  <div class="vs-line">
    <div class="line"></div>
    <span>NOT</span>
    <div class="line"></div>
  </div>

  <h1><span class="struck">BOUGHT</span></h1>

  <div class="tagline">
    Earned with Calluses.<br/>
    Proven by the Work.
  </div>

  <div class="bottom-stamp">
    <div class="bar"></div>
    <span>Wired &amp; Built</span>
    <div class="bar"></div>
  </div>
</div>

</body>
</html>
