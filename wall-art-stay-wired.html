<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAY WIRED — WiredAndBuilt Wall Art</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .art-frame {
    width: 800px;
    height: 1000px;
    background: #0d0d0d;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .art-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 2;
  }

  /* Circuit board traces */
  .traces {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.08;
  }
  .trace {
    position: absolute;
    background: #E8640A;
  }
  .t1 { top: 18%; left: 0; width: 25%; height: 1px; }
  .t2 { top: 18%; left: 25%; width: 1px; height: 15%; }
  .t3 { top: 33%; left: 25%; width: 12%; height: 1px; }
  .t4 { bottom: 22%; right: 0; width: 20%; height: 1px; }
  .t5 { bottom: 22%; right: 20%; width: 1px; height: 12%; }
  .t6 { bottom: 34%; right: 20%; width: 15%; height: 1px; }
  .t7 { top: 50%; left: 0; width: 8%; height: 1px; }
  .t8 { top: 45%; right: 0; width: 10%; height: 1px; }

  /* Connection dots */
  .node {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #E8640A;
    border-radius: 50%;
    opacity: 0.12;
    z-index: 1;
  }
  .n1 { top: calc(18% - 3px); left: calc(25% - 3px); }
  .n2 { top: calc(33% - 3px); left: calc(37% - 3px); }
  .n3 { bottom: calc(22% - 3px); right: calc(20% - 3px); }
  .n4 { bottom: calc(34% - 3px); right: calc(35% - 3px); }

  .content {
    position: relative;
    z-index: 3;
    text-align: center;
    padding: 60px 50px;
  }

  .tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: #E8640A;
    letter-spacing: 4px;
    margin-bottom: 35px;
    opacity: 0.6;
  }

  .headline {
    font-family: 'Bebas Neue', 'Oswald', sans-serif;
    font-size: 110px;
    color: #ffffff;
    letter-spacing: 14px;
    line-height: 1.05;
    text-transform: uppercase;
  }

  .headline .accent {
    color: #E8640A;
  }

  .divider {
    width: 100px;
    height: 2px;
    background: #E8640A;
    margin: 40px auto;
    position: relative;
  }
  .divider::before {
    content: '';
    position: absolute;
    left: 50%;
    top: -4px;
    width: 10px;
    height: 10px;
    border: 2px solid #E8640A;
    border-radius: 50%;
    transform: translateX(-50%);
    background: #0d0d0d;
  }

  .subtext {
    font-family: 'Oswald', sans-serif;
    font-size: 17px;
    color: #777;
    letter-spacing: 4px;
    text-transform: uppercase;
    line-height: 1.8;
    font-weight: 400;
  }

  .side-text {
    position: absolute;
    left: 38px;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: #333;
    text-transform: uppercase;
    z-index: 3;
  }

  @media print {
    html, body {
      width: 8in;
      height: 10in;
      margin: 0;
      padding: 0;
      background: #0d0d0d;
    }
    .art-frame {
      width: 8in;
      height: 10in;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    @page {
      size: 8in 10in;
      margin: 0;
    }
  }
</style>
</head>
<body>
<div class="art-frame">
  <div class="traces">
    <div class="trace t1"></div>
    <div class="trace t2"></div>
    <div class="trace t3"></div>
    <div class="trace t4"></div>
    <div class="trace t5"></div>
    <div class="trace t6"></div>
    <div class="trace t7"></div>
    <div class="trace t8"></div>
  </div>
  <div class="node n1"></div>
  <div class="node n2"></div>
  <div class="node n3"></div>
  <div class="node n4"></div>
  <div class="content">
    <div class="tag">[ CONNECTED // FOCUSED // LOCKED IN ]</div>
    <div class="headline">STAY<br><span class="accent">WIRED</span></div>
    <div class="divider"></div>
    <div class="subtext">Stay connected to the work.<br>Stay locked into the vision.</div>
  </div>
  <div class="side-text">WiredAndBuilt</div>
</div>
</body>
</html>
