<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRUST THE PROCESS — WiredAndBuilt Wall Art</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .art-frame {
    width: 800px;
    height: 1000px;
    background: #0d0d0d;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .art-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.07;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 2;
  }

  /* Blueprint grid background */
  .grid {
    position: absolute;
    inset: 60px;
    z-index: 1;
    pointer-events: none;
    opacity: 0.06;
    background-image:
      linear-gradient(#E8640A 1px, transparent 1px),
      linear-gradient(90deg, #E8640A 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .content {
    position: relative;
    z-index: 3;
    text-align: center;
    padding: 60px 50px;
  }

  /* Step indicators */
  .steps {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 50px;
  }
  .step {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .step-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    color: #E8640A;
    line-height: 1;
  }
  .step-label {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    color: #555;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .step-connector {
    width: 40px;
    height: 1px;
    background: #E8640A;
    opacity: 0.3;
    margin: 0 12px;
    margin-bottom: 18px;
  }

  .headline {
    font-family: 'Bebas Neue', 'Oswald', sans-serif;
    font-size: 86px;
    color: #ffffff;
    letter-spacing: 8px;
    line-height: 1.1;
    text-transform: uppercase;
  }

  .headline .accent {
    color: #E8640A;
  }

  .divider {
    width: 120px;
    height: 3px;
    background: #E8640A;
    margin: 35px auto;
  }

  .subtext {
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    color: #777;
    letter-spacing: 4px;
    text-transform: uppercase;
    line-height: 1.8;
    font-weight: 400;
  }

  .side-text {
    position: absolute;
    right: 38px;
    top: 50%;
    transform: translateY(-50%) rotate(90deg);
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: #333;
    text-transform: uppercase;
    z-index: 3;
  }

  @media print {
    html, body {
      width: 8in;
      height: 10in;
      margin: 0;
      padding: 0;
      background: #0d0d0d;
    }
    .art-frame {
      width: 8in;
      height: 10in;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    @page {
      size: 8in 10in;
      margin: 0;
    }
  }
</style>
</head>
<body>
<div class="art-frame">
  <div class="grid"></div>
  <div class="content">
    <div class="steps">
      <div class="step">
        <div class="step-num">01</div>
        <div class="step-label">Plan</div>
      </div>
      <div class="step-connector"></div>
      <div class="step">
        <div class="step-num">02</div>
        <div class="step-label">Build</div>
      </div>
      <div class="step-connector"></div>
      <div class="step">
        <div class="step-num">03</div>
        <div class="step-label">Repeat</div>
      </div>
    </div>
    <div class="headline">TRUST<br>THE<br><span class="accent">PROCESS</span></div>
    <div class="divider"></div>
    <div class="subtext">Results follow reps.<br>Not wishes.</div>
  </div>
  <div class="side-text">WiredAndBuilt</div>
</div>
</body>
</html>
