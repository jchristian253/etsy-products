<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAKE UP BUILD — WiredAndBuilt Wall Art</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Bebas+Neue&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .art-frame {
    width: 800px;
    height: 1000px;
    background: #0d0d0d;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Grain texture */
  .art-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.07;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 2;
  }

  .content {
    position: relative;
    z-index: 3;
    text-align: center;
    padding: 60px 50px;
  }

  .line {
    font-family: 'Bebas Neue', 'Oswald', sans-serif;
    font-size: 100px;
    color: #ffffff;
    letter-spacing: 14px;
    line-height: 1.15;
    text-transform: uppercase;
  }

  .line:last-of-type {
    color: #E8640A;
  }

  .underline {
    width: 220px;
    height: 2px;
    background: #E8640A;
    margin: 45px auto 40px;
    opacity: 0.6;
  }

  .subtext {
    font-family: 'Oswald', sans-serif;
    font-size: 17px;
    color: #666;
    letter-spacing: 5px;
    text-transform: uppercase;
    font-weight: 400;
  }

  /* Minimal left bar accent */
  .left-bar {
    position: absolute;
    left: 55px;
    top: 50%;
    transform: translateY(-50%);
    width: 2px;
    height: 160px;
    background: linear-gradient(to bottom, transparent, #E8640A 30%, #E8640A 70%, transparent);
    opacity: 0.25;
    z-index: 3;
  }

  .side-text {
    position: absolute;
    right: 38px;
    top: 50%;
    transform: translateY(-50%) rotate(90deg);
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: #333;
    text-transform: uppercase;
    z-index: 3;
  }

  @media print {
    html, body {
      width: 8in;
      height: 10in;
      margin: 0;
      padding: 0;
      background: #0d0d0d;
    }
    .art-frame {
      width: 8in;
      height: 10in;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    @page {
      size: 8in 10in;
      margin: 0;
    }
  }
</style>
</head>
<body>
<div class="art-frame">
  <div class="left-bar"></div>
  <div class="content">
    <div class="line">WAKE UP.</div>
    <div class="line">SHOW UP.</div>
    <div class="line">BUILD.</div>
    <div class="underline"></div>
    <div class="subtext">Discipline is the only shortcut.</div>
  </div>
  <div class="side-text">WiredAndBuilt</div>
</div>
</body>
</html>
