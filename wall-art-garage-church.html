<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GARAGE CHURCH — WiredAndBuilt Wall Art</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Bebas+Neue&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .art-frame {
    width: 800px;
    height: 1000px;
    background: #0d0d0d;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Garage door lines */
  .garage-lines {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }
  .g-line {
    position: absolute;
    left: 8%;
    right: 8%;
    height: 1px;
    background: linear-gradient(to right, transparent, #222 15%, #222 85%, transparent);
  }
  .g-line:nth-child(1) { top: 12%; }
  .g-line:nth-child(2) { top: 24%; }
  .g-line:nth-child(3) { top: 36%; }
  .g-line:nth-child(4) { top: 64%; }
  .g-line:nth-child(5) { top: 76%; }
  .g-line:nth-child(6) { top: 88%; }

  /* Warm overhead glow */
  .art-frame::before {
    content: '';
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 500px;
    background: radial-gradient(ellipse at center, rgba(232,100,10,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 1;
  }

  .art-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.08;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 2;
  }

  .content {
    position: relative;
    z-index: 3;
    text-align: center;
    padding: 60px 50px;
  }

  .top-label {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    color: #555;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 30px;
  }

  .headline {
    font-family: 'Bebas Neue', 'Oswald', sans-serif;
    font-size: 96px;
    color: #ffffff;
    letter-spacing: 10px;
    line-height: 1.05;
    text-transform: uppercase;
  }

  .headline .accent {
    color: #E8640A;
  }

  .divider {
    width: 50px;
    height: 50px;
    margin: 35px auto;
    position: relative;
  }
  .divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 3px;
    background: #E8640A;
  }
  .divider::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 3px;
    background: #E8640A;
    opacity: 0.4;
  }

  .subtext {
    font-family: 'Oswald', sans-serif;
    font-size: 17px;
    color: #888;
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1.8;
    max-width: 500px;
    margin: 0 auto;
    font-weight: 400;
  }

  .side-text {
    position: absolute;
    right: 38px;
    top: 50%;
    transform: translateY(-50%) rotate(90deg);
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: #333;
    text-transform: uppercase;
    z-index: 3;
  }

  @media print {
    html, body {
      width: 8in;
      height: 10in;
      margin: 0;
      padding: 0;
      background: #0d0d0d;
    }
    .art-frame {
      width: 8in;
      height: 10in;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    @page {
      size: 8in 10in;
      margin: 0;
    }
  }
</style>
</head>
<body>
<div class="art-frame">
  <div class="garage-lines">
    <div class="g-line"></div>
    <div class="g-line"></div>
    <div class="g-line"></div>
    <div class="g-line"></div>
    <div class="g-line"></div>
    <div class="g-line"></div>
  </div>
  <div class="content">
    <div class="top-label">Welcome to the</div>
    <div class="headline"><span class="accent">GARAGE</span><br>CHURCH</div>
    <div class="divider"></div>
    <div class="subtext">Where problems get solved<br>and excuses don't survive.</div>
  </div>
  <div class="side-text">WiredAndBuilt</div>
</div>
</body>
</html>
